{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Add New Team</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Team Full Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="short_name" class="form-label">Team Short Name *</label>
                            <input type="text" class="form-control" id="short_name" name="short_name" maxlength="10" required>
                            <small class="text-muted">e.g., MI, CSK, RCB</small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="owner" class="form-label">Team Owner</label>
                            <input type="text" class="form-control" id="owner" name="owner">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="coach" class="form-label">Head Coach</label>
                            <input type="text" class="form-control" id="coach" name="coach">
                        </div>
                    </div>

                    <!-- Team Picture Upload Field -->
                    <div class="mb-3">
                        <label for="team_logo" class="form-label">Team Logo / Picture</label>
                        <input type="file" class="form-control" id="team_logo" name="team_logo" accept="image/*">
                        <small class="text-muted">Upload team logo or picture (JPG, PNG, GIF)</small>
                    </div>

                    <!-- Total Budget in Rupees -->
                    <div class="mb-3">
                        <label for="total_budget" class="form-label">Total Budget (in Rupees) *</label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" class="form-control" id="total_budget" name="total_budget" step="10000" min="10000" value="10000" required>
                        </div>
                        <small class="text-muted">Minimum budget: ₹10,000 </small>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('teams') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add Team</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
